<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ward Management | Wellmeadows Hospital</title>
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- External CSS -->
    <link rel="stylesheet" href="/assets/css/department-management.css">
    <!-- Supabase Config -->
    <script src="/assets/js/supabase-config.js"></script>
</head>
<body>

<div class="app-container">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-area">
                <i class="fas fa-hospital-user logo-icon"></i>
                <div class="logo-text">Wellmeadows</div>
            </div>
            <p class="logo-sub">Ward Management</p>
        </div>
        
        <nav class="sidebar-nav">
            <a href="/index.html" class="nav-item">
                <i class="fas fa-chalkboard-user"></i>
                <span>Dashboard</span>
            </a>
            <a href="/pages/staff-management.html" class="nav-item">
                <i class="fas fa-user-md"></i>
                <span>Staff Management</span>
            </a>
            <a href="/pages/ward-management.html" class="nav-item active">
                <i class="fas fa-hospital-alt"></i>
                <span>Ward Management</span>
            </a>
            <a href="/pages/department-management.html" class="nav-item">
                <i class="fas fa-building"></i>
                <span>Department Management</span>
            </a>
            <a href="/pages/patient-records.html" class="nav-item">
                <i class="fas fa-notes-medical"></i>
                <span>Patients</span>
            </a>
            <a href="/pages/staff-records.html" class="nav-item">
                <i class="fas fa-id-card"></i>
                <span>Staff Records</span>
            </a>
            <a href="/pages/department-records.html" class="nav-item">
                <i class="fas fa-folder-tree"></i>
                <span>Department Records</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-sliders-h"></i>
                <span>Settings</span>
            </a>
        </nav>
        
        <div class="sidebar-footer">
            <div class="status-indicator">
                <i class="fas fa-circle"></i>
                <span>System Online</span>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <div class="content-header">
            <h1>Ward Management</h1>
            <p>Create, edit, and manage hospital wards</p>
        </div>

        <div class="grid-2">
            <!-- Ward Form -->
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-plus-circle"></i>
                    <h3>Add / Edit Ward</h3>
                </div>
                <div class="card-body">
                    <form id="wardForm">
                        <input type="hidden" id="wardId">
                        <div class="form-group">
                            <label>Ward ID</label>
                            <input type="number" id="wardIdInput" placeholder="Auto-generated for new wards" disabled>
                        </div>
                        <div class="form-group">
                            <label>Ward Name *</label>
                            <input type="text" id="wardName" placeholder="e.g., Cardiac ICU, Orthopedic Ward" required>
                        </div>
                        <div class="form-group">
                            <label>Location</label>
                            <input type="text" id="wardLocation" placeholder="e.g., Building A, 3rd Floor">
                        </div>
                        <div class="form-group">
                            <label>Ward Type</label>
                            <select id="wardType">
                                <option value="">-- Select Type --</option>
                                <option value="ICU">ICU</option>
                                <option value="General">General</option>
                                <option value="Orthopedic">Orthopedic</option>
                                <option value="Pediatric">Pediatric</option>
                                <option value="Maternity">Maternity</option>
                                <option value="Cardiology">Cardiology</option>
                                <option value="Neurology">Neurology</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Total Beds</label>
                            <input type="number" id="wardBeds" placeholder="e.g., 20">
                        </div>
                        <div class="form-group">
                            <label>Telephone Extension</label>
                            <input type="text" id="wardPhone" placeholder="e.g., 2345">
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn-primary">
                                <i class="fas fa-save"></i> Save Ward
                            </button>
                            <button type="button" class="btn-secondary" id="clearBtn">
                                <i class="fas fa-eraser"></i> Clear
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Wards List -->
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-list"></i>
                    <h3>Wards</h3>
                </div>
                <div class="card-body table-container">
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Ward ID</th>
                                    <th>Ward Name</th>
                                    <th>Location</th>
                                    <th>Type</th>
                                    <th>Beds</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="wardsTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- External JavaScript -->
<script src="/assets/js/ward-management.js"></script>
</body>
</html>
